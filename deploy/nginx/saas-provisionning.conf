# Modèle de configuration Nginx — reverse proxy devant le serveur Next.js.
#
# Mise en place :
#   1. Copier dans /etc/nginx/sites-available/saas-provisionning.conf
#   2. Remplacer VOTRE_DOMAINE par le domaine réel (ex. app.pichinov.fr)
#   3. Activer : ln -s ../sites-available/saas-provisionning.conf /etc/nginx/sites-enabled/
#   4. Tester + recharger : nginx -t && systemctl reload nginx
#   5. Activer le HTTPS : certbot --nginx -d VOTRE_DOMAINE
#      (Certbot ajoute automatiquement le bloc 443 et la redirection HTTP→HTTPS)

server {
    listen 80;
    listen [::]:80;
    server_name VOTRE_DOMAINE;

    # Taille maximale du corps des requêtes (formulaire d'inscription, etc.).
    client_max_body_size 10M;

    location / {
        # Le serveur Next n'écoute qu'en local (cf. ecosystem.config.js).
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # En-têtes indispensables pour que Next connaisse l'hôte et le protocole
        # réels vus par le client (et non ceux du proxy local).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support du streaming (composants Suspense / fichiers loading) : on
        # désactive la mise en tampon pour que les réponses partielles soient
        # transmises immédiatement (recommandation officielle Next.js).
        proxy_buffering off;
        proxy_set_header X-Accel-Buffering no;
    }
}

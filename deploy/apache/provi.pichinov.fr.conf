# Reverse proxy Apache pour le front Next.js — https://provi.pichinov.fr
#
# Le VPS sert DÉJÀ Dolibarr/SellYourSaaS via Apache (MPM-ITK) sur les ports 80/443.
# On ne peut donc pas y ajouter un second serveur web (nginx) sur ces mêmes ports :
# on AJOUTE simplement ce vhost Apache, qui relaie vers le serveur Next local.
#
# Pré-requis :
#   sudo a2enmod proxy proxy_http
#   sudo certbot certonly --dns-ovh --dns-ovh-credentials /etc/letsencrypt/ovh.ini -d provi.pichinov.fr
# Activation :
#   sudo cp deploy/apache/provi.pichinov.fr.conf /etc/apache2/sites-available/
#   sudo a2ensite provi.pichinov.fr && sudo apache2ctl configtest && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName provi.pichinov.fr
    # Redirige tout le trafic HTTP vers HTTPS.
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName provi.pichinov.fr

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/provi.pichinov.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/provi.pichinov.fr/privkey.pem

    # Reverse proxy uniquement (jamais de forward proxy ouvert).
    ProxyRequests Off
    # Transmet l'hôte réel + signale le HTTPS au serveur Next (URLs absolues correctes).
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Relai vers le serveur Next local (cf. ecosystem.config.js : 127.0.0.1:3000).
    # flushpackets=on : pas de mise en tampon → le streaming Next passe en direct.
    ProxyPass        / http://127.0.0.1:3000/ flushpackets=on
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  ${APACHE_LOG_DIR}/provi-error.log
    CustomLog ${APACHE_LOG_DIR}/provi-access.log combined
</VirtualHost>

# ── Redirection de register.php (formulaire d'inscription SYS brut) ──────────
#
# Objectif : personne ne doit accéder au formulaire d'inscription natif de
# SellYourSaas (https://myaccount.with1.pichinov.fr/register.php). Les visiteurs
# passent par l'application Provi (page « Métiers »), qui pilote l'inscription via
# son API. On redirige donc register.php vers la page Métiers du front.
#
# ⚠️ EXCLUSION OBLIGATOIRE : l'application fait elle-même un
#     GET register.php?plan=<service>
# pour récupérer le cookie de session + le jeton CSRF AVANT de POSTer vers
# register_instance.php (cf. lib/dolibarr/instances.ts). Cet appel porte TOUJOURS
# le paramètre ?plan=. On ne redirige donc QUE si `plan=` est absent → un humain
# qui clique « Pas de compte ? » (lien register.php nu) est redirigé, mais l'appel
# CSRF de l'app (avec ?plan=) passe normalement et le provisioning continue de
# fonctionner.
#
# Où l'ajouter : à l'intérieur du <VirtualHost> du portail
#   /etc/apache2/sites-available/myaccount.with1.pichinov.fr.conf
# puis : apache2ctl configtest && systemctl reload apache2
# (mod_rewrite doit être actif : a2enmod rewrite)
#
# Adapter l'URL cible si le domaine du front change.

RewriteEngine On
RewriteCond %{QUERY_STRING} !(^|&)plan=
RewriteRule ^/?register\.php$ https://provi.pichinov.fr/metiers? [R=302,L]
